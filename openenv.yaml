spec_version: 1

name: agentic-security-lab
version: "2.0.0"
description: >
  Round 2 OpenEnv environment for long-horizon planning, world modeling, and
  self-improvement RL in a supply-chain incident response simulation.

type: step-reset

tags:
  - openenv
  - security
  - supply-chain
  - devops
  - incident-response
  - long-horizon
  - world-modeling
  - self-improvement

tasks:
  - name: easy
    description: >
      Single compromised package (axios@1.7.4), 2 secrets, 3 consumer teams.
      Agent must inspect, quarantine, rotate, and notify within 14 steps.
    difficulty: easy
    max_steps: 20

  - name: medium
    description: >
      Transitive dependency attack via form-data@4.0.1 (a dep of node-fetch).
      Agent must trace the dependency graph to find the root package.
      5 secrets, 12 consumer teams. 18-step exfiltration window.
    difficulty: medium
    max_steps: 25

  - name: hard
    description: >
      PhantomRaven-style coordinated campaign: 5 slopsquatted packages,
      8 secrets including CI/CD tokens, 20 consumer teams, attacker already
      active. Race-against-the-clock with a 10-step exfiltration window.
    difficulty: hard
    max_steps: 35

runtime:
  type: docker
  dockerfile: Dockerfile

app:
  port: 8000
  startup_command: "uvicorn server.app:app --host 0.0.0.0 --port 8000"

action_space:
  type: structured
  fields:
    command:
      type: string
      enum:
        - inspect_package
        - check_dependents
        - rotate_secret
        - quarantine
        - notify
        - scan_logs
        - conclude
    parameters:
      type: dict

observation_space:
  type: structured
  fields:
    success: bool
    done: bool
    reward: float
    result: string
    data: dict
    incident_summary: string
    steps_remaining: int
    exposed_secrets: list[string]
    active_malicious_packages: list[string]
    visible_alerts: list[string]
    uncertainty_score: float
    plan_progress: dict
    info: dict
    error: optional[string]

reward:
  min: -0.30
  max: 0.70
  shaped: true
  description: >
    Multi-component reward and verifier setup with dense step rewards, delayed
    terminal bonuses, and anti-hacking penalties. Includes planning progress
    and partial-observability dynamics for long-horizon training.